id: "301"
code: CC 301
title: "Extending Claude Code: Skills, Hooks & MCP"
version: 1.0.0
formats: [self-paced, instructor-deck]
audience: >
  Everyone who has finished CC 201 and wants Claude Code to know their
  workflows, enforce their rules, and reach their data. No software-engineering
  background assumed.
